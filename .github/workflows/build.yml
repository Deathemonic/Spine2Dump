name: Build and Release

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        type: string
      prerelease:
        type: boolean
        default: false
      verify:
        type: boolean
        default: false

jobs:
  build:
    name: Build for ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: linux-x86_64, os: ubuntu-latest, binary: spine2dump, static: true }
          - { name: windows-x86_64, os: windows-latest, binary: spine2dump.exe, static: true }
          - { name: macos-x86_64, os: macos-latest, binary: spine2dump, static: false }
          - { name: macos-aarch64, os: macos-latest, binary: spine2dump, static: false }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja llvm nasm

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            git
            make
            nasm
            mingw-w64-clang-x86_64-cmake
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-ninja

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          docker run --rm -v "$PWD:/work" -w /work alpine:3.20 sh -lc '
            apk add --no-cache \
              bash \
              build-base \
              clang \
              cmake \
              git \
              make \
              mesa-dev \
              nasm \
              ninja \
              openmp-dev \
              perl \
              python3 \
              zlib-dev \
              zlib-static &&
            cmake -S . -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_C_COMPILER=clang \
              -DSTATIC=ON \
              -DFFMPEG_PROVIDER=external &&
            cmake --build build --config Release
          '

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSTATIC=ON \
            -DFFMPEG_PROVIDER=external

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          LLVM_PREFIX="$(brew --prefix llvm)"
          cmake -S . -B build -G Ninja \
            -DCMAKE_C_COMPILER="${LLVM_PREFIX}/bin/clang" \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake --build build --config Release

      - name: Build
        if: runner.os == 'macOS'
        run: cmake --build build --config Release

      - name: Upload Artifact
        if: matrix.config.static
        uses: actions/upload-artifact@v4
        with:
          name: spine2dump-${{ matrix.config.name }}
          path: build/${{ matrix.config.binary }}

      - name: Install Artifact
        if: ${{ !matrix.config.static }}
        run: cmake --install build --prefix dist --component Runtime

      - name: Upload Artifact
        if: ${{ !matrix.config.static }}
        uses: actions/upload-artifact@v4
        with:
          name: spine2dump-${{ matrix.config.name }}
          path: dist/bin/*

  verify:
    name: Verify ${{ matrix.config.name }}
    needs: [build]
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: linux-x86_64, os: ubuntu-latest, binary: spine2dump }
          - { name: windows-x86_64, os: windows-latest, binary: spine2dump.exe }
          - { name: macos-x86_64, os: macos-latest, binary: spine2dump }
          - { name: macos-aarch64, os: macos-latest, binary: spine2dump }
    steps:
      - name: Skip Verify
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.verify }}
        run: echo "Verification disabled."

      - name: Download Artifact
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.verify }}
        uses: actions/download-artifact@v4
        with:
          name: spine2dump-${{ matrix.config.name }}
          path: verify

      - name: Verify (Linux)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.verify && runner.os == 'Linux' }}
        run: |
          chmod +x verify/${{ matrix.config.binary }}
          docker run --rm -v "$PWD/verify:/app:ro" ubuntu:24.04 /app/${{ matrix.config.binary }} --help

      - name: Verify (Windows)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.verify && runner.os == 'Windows' }}
        shell: pwsh
        run: .\verify\${{ matrix.config.binary }} --help

      - name: Verify (macOS)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.verify && runner.os == 'macOS' }}
        run: |
          chmod +x verify/${{ matrix.config.binary }}
          ./verify/${{ matrix.config.binary }} --help

  deploy:
    name: Release
    needs: [build, verify]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/') || inputs.tag != ''
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout
        if: inputs.tag != ''
        uses: actions/checkout@v4

      - name: Create tag
        if: inputs.tag != ''
        run: |
          git tag ${{ inputs.tag }}
          git push origin ${{ inputs.tag }}

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Package
        run: |
          cd artifacts
          for dir in */; do
            dir_name=${dir%/}
            cd "$dir"
            zip "../${dir_name}.zip" ./*
            cd ..
          done

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: artifacts/*.zip
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease || false }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
