name: Build and Release

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        type: string
      prerelease:
        type: boolean
        default: false

jobs:
  build:
    name: Build for ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      matrix:
        config:
          - { name: linux-x86_64, os: ubuntu-latest, binary: spine2dump }
          - { name: windows-x86_64, os: windows-latest, binary: spine2dump.exe }
          - { name: macos-x86_64, os: macos-latest, binary: spine2dump }
          - { name: macos-aarch64, os: macos-latest, binary: spine2dump }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build clang nasm libomp-dev libgl1-mesa-dev libegl1-mesa-dev zlib1g-dev

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja llvm nasm

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        uses: seanmiddleditch/gha-setup-ninja@master

      - name: Install nasm (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          LLVM_PREFIX="$(brew --prefix llvm)"
          cmake -S . -B build -G Ninja \
            -DCMAKE_C_COMPILER="${LLVM_PREFIX}/bin/clang" \
            -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: cmake -S . -B build -G Ninja -DCMAKE_C_COMPILER=clang -DCMAKE_BUILD_TYPE=Release -DSTATIC_LINUX=ON

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build -G Ninja -DCMAKE_C_COMPILER=clang -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spine2dump-${{ matrix.config.name }}
          path: build/${{ matrix.config.binary }}

  deploy:
    name: Release
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/') || inputs.tag != ''
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout
        if: inputs.tag != ''
        uses: actions/checkout@v4

      - name: Create tag
        if: inputs.tag != ''
        run: |
          git tag ${{ inputs.tag }}
          git push origin ${{ inputs.tag }}

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Package
        run: |
          cd artifacts
          for dir in */; do
            dir_name=${dir%/}
            cd "$dir"
            zip "../${dir_name}.zip" ./*
            cd ..
          done

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: artifacts/*.zip
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease || false }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}